<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="800" viewBox="0 0 1400 800">
  <defs>
    <linearGradient id="bgGrad" x1="0" x2="1">
      <stop offset="0" stop-color="#7DD3FC"/>
      <stop offset="1" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feBlend in="SourceGraphic" in2="b" mode="normal"/>
    </filter>
    <style>
      .bg{fill:url(#bgGrad)}
      .title{font-family:Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; font-size:54px; fill:#021124; font-weight:800}
      .subtitle{font-family:Inter, sans-serif; font-size:20px; fill:#021124; opacity:0.9}
      .tag{font-family:Inter, sans-serif; font-size:14px; fill:#fff}
      .chip{rx:10}
    </style>
  </defs>

  <rect class="bg" width="1400" height="800" rx="28"/>

  <g transform="translate(72,120)">
    <text class="title">AI Tools Course</text>
    <text class="subtitle" y="64">Practical recorded sessions on tools and applications</text>
    <g transform="translate(0,110)">
      <rect class="chip" x="0" y="0" width="86" height="32" rx="8" fill="url(#accent)"/>
      <text class="tag" x="18" y="21">AI</text>
      <rect class="chip" x="106" y="0" width="120" height="32" rx="8" fill="url(#accent)" opacity="0.9"/>
      <text class="tag" x="126" y="21">Tools &amp; Labs</text>
    </g>
    <g transform="translate(0,220)">
      <text class="subtitle">ETLP Faculty · 13 Sessions · Hands-on</text>
    </g>
  </g>

  <g transform="translate(980,160)">
    <rect width="360" height="360" rx="18" fill="rgba(255,255,255,0.06)"/>
    <g transform="translate(36,36)">
      <rect x="16" y="16" width="232" height="232" rx="18" fill="url(#accent)" opacity="0.95"/>
      <g fill="#fff" opacity="0.95">
        <rect x="40" y="40" width="24" height="24" rx="4"/>
        <rect x="72" y="40" width="24" height="24" rx="4"/>
        <rect x="104" y="40" width="24" height="24" rx="4"/>
        <rect x="40" y="72" width="88" height="64" rx="8" opacity="0.96"/>
        <rect x="136" y="80" width="40" height="48" rx="8" opacity="0.96"/>
      </g>
      <g stroke="#ffffff" stroke-opacity="0.45" stroke-width="3" fill="none">
        <path d="M10 140 L0 170"/>
        <path d="M244 140 L272 120"/>
        <path d="M30 180 L200 200"/>
      </g>
    </g>
  </g>

</svg>